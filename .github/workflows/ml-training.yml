name: ML Training

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ml/**'

jobs:
  train:
    name: Train & Convert Model
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate synthetic data
        run: python generate_data.py
        continue-on-error: true

      - name: Train model
        run: python train.py
        continue-on-error: true

      - name: Convert to TFLite
        run: python convert_tflite.py
        continue-on-error: true

      - name: Check for model changes
        id: model-check
        run: |
          if [ -d "models" ]; then
            git diff --quiet models/ || echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated model
        if: steps.model-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ml/models/
          git commit -m "chore: update trained ML model [skip ci]"
          git push
